server.port=${PORT:5051}
spring.main.banner-mode=off
spring.thymeleaf.cache=false

lifechiro.database.path=${LIFECHIRO_DATABASE_PATH:${user.dir}/../instance/chiro.sqlite3}
lifechiro.secret=${SECRET_KEY:}
lifechiro.reminder.email-mode=${REMINDER_EMAIL_MODE:outbox}
lifechiro.reminder.sms-mode=${REMINDER_SMS_MODE:outbox}
lifechiro.smtp.host=${SMTP_HOST:}
lifechiro.smtp.port=${SMTP_PORT:587}
lifechiro.smtp.username=${SMTP_USERNAME:}
lifechiro.smtp.password=${SMTP_PASSWORD:}
lifechiro.default-staff.email=${LIFECHIRO_DEFAULT_STAFF_EMAIL:staff@example.com}
lifechiro.default-staff.password=${LIFECHIRO_DEFAULT_STAFF_PASSWORD:staffpass123}
lifechiro.default-staff.first-name=${LIFECHIRO_DEFAULT_STAFF_FIRST_NAME:Dr}
lifechiro.default-staff.last-name=${LIFECHIRO_DEFAULT_STAFF_LAST_NAME:Stone}
lifechiro.demo-invite.token=${LIFECHIRO_DEMO_INVITE_TOKEN:demo-invite-token}
lifechiro.demo-invite.email=${LIFECHIRO_DEMO_INVITE_EMAIL:new.patient@example.com}
